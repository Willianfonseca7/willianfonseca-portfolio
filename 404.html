<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var path = window.location.pathname
          .replace("/willianfonseca-portfolio", "")
          .replace(/\/$/, "");
        var search = window.location.search
          ? window.location.search.slice(1).replace(/&/g, "~and~")
          : "";
        var target =
          "/willianfonseca-portfolio/?" +
          "p=" +
          encodeURIComponent(path + (search ? "?" + search : "")) +
          window.location.hash;

        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
